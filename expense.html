<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link rel="stylesheet" href="expense.css">
</style>
</head>
<body>

<div class="container">
  <h2></h2>

  <div class="balance">
    <p>Your Balance</p>
    <h1 id="balance">₦0</h1>
  </div>

  <form id="form">
    <input type="text" id="text" placeholder="Enter description..." required>
    <input type="number" id="amount" placeholder="Enter amount (+income, -expense)" required>
    <button>Add Transaction</button>
  </form>

  <div class="list" id="list"></div>
</div>

<script>
const form = document.getElementById('form');
const text = document.getElementById('text');
const amount = document.getElementById('amount');
const list = document.getElementById('list');
const balance = document.getElementById('balance');

let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function updateUI(){
  list.innerHTML = '';

  let total = 0;

  transactions.forEach((t, index) =>{
    total += t.amount;

    const div = document.createElement('div');
    div.classList.add('item');
    div.classList.add(t.amount > 0 ? 'income' : 'expense');

    div.innerHTML = `
      ${t.text} <span>${t.amount}</span>
      <button class="delete" onclick="removeTransaction(${index})">x</button>
    `;

    list.appendChild(div);
  });

  balance.innerText = '₦' + total;
  localStorage.setItem('transactions', JSON.stringify(transactions));
}

form.addEventListener('submit', (e)=>{
  e.preventDefault();

  const newTransaction = {
    text: text.value,
    amount: +amount.value
  };

  transactions.push(newTransaction);
  text.value = '';
  amount.value = '';

  updateUI();
});

function removeTransaction(index){
  transactions.splice(index,1);
  updateUI();
}

updateUI();
</script>

</body>
</html>
